services:
  - type: web
    name: smart-visita-backend
    env: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-visita-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: smart-visita-db
    databaseName: smart_visita
    user: smart_visita_user
    plan: free
    region: oregon
